services:
  - type: web
    name: signal-clone-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        sync: false   # Set in Render dashboard to your Vercel URL
      # DATABASE_URL is intentionally NOT set — the app uses a local SQLite
      # file and auto-seeds demo data on startup. Render's free tier has an
      # ephemeral filesystem, so the DB is re-seeded automatically on restart.
