services:
  - type: web
    name: signal-clone-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        value: sqlite:////data/signal_clone.db
      - key: ALLOWED_ORIGINS
        sync: false   # Set this in Render dashboard to your Vercel URL
    disk:
      name: signal-db
      mountPath: /data
      sizeGB: 1
